<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Keshave 🎉</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      color: white;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(0,0,0,0.25);
      padding: 40px;
      border-radius: 15px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 20px;
    }

    button {
      background: white;
      color: #2575fc;
      border: none;
      padding: 12px 25px;
      font-size: 16px;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .hidden {
      display: none;
      margin-top: 20px;
      font-size: 20px;
      color: #ffd700;
      font-weight: bold;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px);}
      to { opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🎉 Happy Birthday Keshave! 🎂</h1>
    <h2>Wishing you a year filled with success, happiness & adventure.</h2>

    <p>
      You are not just my brother, but my best friend and biggest inspiration.
      I’m proud of the person you are becoming.
    </p>

    <button onclick="revealGift()">Click to Open Your Gift 🎁</button>

    <div id="gift" class="hidden">
      🌐 This domain <br>
      <strong>Keshave.com</strong> <br>
      belongs to YOU! 🚀
    </div>
  </div>

  <script>
    function revealGift() {
      document.getElementById("gift").style.display = "block";
    }
  </script>

</body>
</html>
